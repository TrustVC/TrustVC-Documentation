name: Deploy Documentation Site (Production)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy-docs:
    name: Build and deploy docs site (Production)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      AWS_REGION: ap-southeast-1
      S3_BUCKET: ${{ secrets.S3_BUCKET_PROD }}
      CF_DISTRIBUTION: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID_PROD }}
      BUILD_DIR: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build docs site
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync assets to S3
        run: |
          aws s3 sync "./${BUILD_DIR}" "s3://${S3_BUCKET}" --delete --exclude "*.html" --cache-control "public, max-age=31536000, immutable"
          aws s3 sync "./${BUILD_DIR}" "s3://${S3_BUCKET}" --cache-control "no-cache, no-store, must-revalidate" --exclude "*" --include "*.html"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CF_DISTRIBUTION}" \
            --paths "/*"
